# For PRs.

name: Build and Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  # See supported Node.js release schedule at https://nodejs.org/en/about/releases
  NODE_VERSION: 22.x

jobs:
  generateConfig:
    name: Generate Config
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Generate dummy config
        run: npm run generate:config
        env:
          COLAB_EXTENSION_ENVIRONMENT: "production"
          COLAB_EXTENSION_CLIENT_ID: "client-id"
          COLAB_EXTENSION_CLIENT_NOT_SO_SECRET: "client-not-so-secret"
      - name: Upload generated config
        uses: actions/upload-artifact@v7
        with:
          name: generated-config
          path: src/colab-config.ts
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: generateConfig
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@v8
        with:
          name: generated-config
          path: src
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      # While spell check runs in lint, here we run it as a separate step to
      # make it easier to see the results and treat violations as errors
      # instead of warnings.
      - name: Spell Check
        run: npx cspell "**" --no-progress --show-suggestions --show-context --exclude "src/jupyter/client/generated/**" --exclude "src/jupyter/client/api.yaml"

  unitTests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: generateConfig
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@v8
        with:
          name: generated-config
          path: src
      - run: npm run test:unit

  vsCodeTests:
    name: VS Code Integration Tests
    strategy:
      matrix:
        # macos-latest and windows-latest can be added as we work towards a release.
        # For now, there's no sense acruing the cost of the runners.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    needs: generateConfig
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Download generated config
        uses: actions/download-artifact@v8
        with:
          name: generated-config
          path: src
      - name: npm run test:integration:headless (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:integration:headless
      - name: npm run test:integration
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:integration

  e2eTests:
    name: VS Code E2E Tests
    permissions:
      actions: write
    # Conditionally use the E2E Tests environment to prevent untrusted code from
    # requiring approval and accessing secrets. Forks evaluate to an empty string,
    # bypassing the environment entirely.
    environment: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'E2E Tests' || '' }}
    strategy:
      matrix:
        # macos-latest and windows-latest can be added as we work towards a release.
        # For now, there's no sense acruing the cost of the runners.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # Limit running the E2E tests until unit tests pass to save on resources.
    needs: unitTests
    env:
      # Secrets and variables are sourced from the "E2E Tests" environment.
      TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
      TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
      COLAB_EXTENSION_ENVIRONMENT: ${{ vars.COLAB_EXTENSION_ENVIRONMENT }}
      COLAB_EXTENSION_CLIENT_ID: ${{ secrets.COLAB_EXTENSION_CLIENT_ID }}
      COLAB_EXTENSION_CLIENT_NOT_SO_SECRET: ${{ secrets.COLAB_EXTENSION_CLIENT_NOT_SO_SECRET }}
    steps:
      # Must checkout before running the composite action since it relies on the
      # code being present. Only do this for same-repository PRs invocations.
      - if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@v6
      - name: Run E2E Tests (Same Repository)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/run-e2e
      - name: Skip E2E Tests (Fork)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "E2E tests are skipped for PRs originating from forks."
          echo "Forks don't have access to repository secrets, they cannot authenticate with the backend."
          echo "A maintainer should test these changes by pushing the fork's branch to the main repository."
